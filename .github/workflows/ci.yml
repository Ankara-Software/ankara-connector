name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: [self-hosted, s31]
          - os: macos
            runner: [self-hosted, s11]
          - os: windows
            runner: [self-hosted, Windows, s18]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Run unit tests
        run: bun test
      - name: Build compiled binary (OS-compat smoke, roadmap §43)
        run: bun build src/index.ts --compile --minify --outfile dist/ankara-connector-smoke
      - name: Smoke test --version + selftest on ${{ matrix.os }}
        run: |
          ./dist/ankara-connector-smoke --version
          ./dist/ankara-connector-smoke selftest
