name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (required for workflow_dispatch)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  build:
    name: build all desktop targets (s31 cross-compile)
    runs-on: [self-hosted, s31]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Build
        run: bun run scripts/build.ts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connector-binaries
          path: dist/*

  release:
    needs: build
    runs-on: [self-hosted, s31]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: connector-binaries
          path: dist
      - name: Compute sha256
        run: |
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt
      - name: Create / attach release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
