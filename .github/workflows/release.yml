name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (required for workflow_dispatch)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: bun-windows-x64
            artifact: ankara-connector-1.1.0-windows-x64.exe
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: ankara-connector-1.1.0-macos-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: ankara-connector-1.1.0-macos-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: ankara-connector-1.1.0-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Build
        run: bun build src/index.ts --compile --minify --target ${{ matrix.target }} --outfile ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compute sha256
        run: |
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt
      - name: Create / attach release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
