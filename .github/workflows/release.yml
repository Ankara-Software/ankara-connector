name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (required for workflow_dispatch)'
        required: true
        default: 'v1.1.4'

permissions:
  contents: write

jobs:
  build-unix:
    name: build macOS + Linux (s31)
    runs-on: [self-hosted, s31]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Build non-Windows targets
        run: |
          bun build src/index.ts --compile --minify --target bun-darwin-x64 --outfile dist/ankara-connector-1.1.4-macos-x64
          bun build src/index.ts --compile --minify --target bun-darwin-arm64 --outfile dist/ankara-connector-1.1.4-macos-arm64
          bun build src/index.ts --compile --minify --target bun-linux-x64 --outfile dist/ankara-connector-1.1.4-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: connector-unix
          path: dist/*

  build-windows:
    name: build Windows tray + installer
    runs-on: [self-hosted, Windows, s18]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Add Scoop to Path
        run: |
          echo "C:\Users\admin\scoop\shims" >> $env:GITHUB_PATH
      - name: Verify Tools
        run: |
          go version
          gcc --version
          makensis /VERSION
      - name: Build Windows pack
        env:
          CGO_ENABLED: "1"
        run: |
          bun add pkcs11js --optional || echo "pkcs11js optional build skipped"
          bun run scripts/build-windows.ts
      - uses: actions/upload-artifact@v4
        with:
          name: connector-windows
          path: dist/*

  release:
    needs: [build-unix, build-windows]
    runs-on: [self-hosted, Linux, s31]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge artifacts
        run: |
          mkdir -p dist
          cp artifacts/connector-unix/* dist/ 2>/dev/null || true
          cp artifacts/connector-windows/* dist/ 2>/dev/null || true
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt
      - name: Create / attach release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
