name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (required for workflow_dispatch)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build-unix:
    name: build macOS + Linux (s31)
    runs-on: [self-hosted, s31]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Build non-Windows targets (interim Bun until Rust shells ship)
        run: |
          bun build src/index.ts --compile --minify --target bun-darwin-x64 --outfile dist/ankara-connector-2.0.0-macos-x64
          bun build src/index.ts --compile --minify --target bun-darwin-arm64 --outfile dist/ankara-connector-2.0.0-macos-arm64
          bun build src/index.ts --compile --minify --target bun-linux-x64 --outfile dist/ankara-connector-2.0.0-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: connector-unix
          path: dist/*

  build-windows:
    name: build Windows Rust + installer (s18)
    runs-on: [self-hosted, Windows, s18]
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Add Scoop + Cargo to Path
        run: |
          $scoop = 'C:\Users\admin\scoop\shims'
          if (Test-Path $scoop) { Add-Content $env:GITHUB_PATH $scoop }
          $cargo = Join-Path $env:USERPROFILE '.cargo\bin'
          if (Test-Path $cargo) { Add-Content $env:GITHUB_PATH $cargo }
      - name: Ensure Rust + NSIS
        run: |
          if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
            scoop install rust
          }
          rustc --version
          cargo --version
          makensis /VERSION
      - name: Build Windows v2 pack
        run: bun run scripts/build-windows.ts
      - uses: actions/upload-artifact@v4
        with:
          name: connector-windows
          path: dist/*

  release:
    needs: [build-unix, build-windows]
    runs-on: [self-hosted, Linux, s31]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge artifacts
        run: |
          mkdir -p dist
          cp artifacts/connector-unix/* dist/ 2>/dev/null || true
          cp artifacts/connector-windows/* dist/ 2>/dev/null || true
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt
      - name: Create / attach release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
